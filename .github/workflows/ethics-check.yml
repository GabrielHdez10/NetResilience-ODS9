name: Auditoria de Estandares Eticos
on: [push, pull_request]

jobs:
  check-ethics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v3

      - name: Validar presencia de Declaracion de Etica
        run: |
          if grep -qi "Etica" README.md; then
            echo "? Checklist de etica aprobado."
          else
            echo "? ERROR: No se encontro la declaracion de etica en el README."
            exit 1
          fi
